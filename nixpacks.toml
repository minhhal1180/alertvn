[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "gcc"]

[phases.install]
cmds = ["python3 -m pip install -r backend/requirements.txt"]

[phases.build]
cmds = ["cd backend && python3 scripts/generate_grid.py && python3 ml/train.py"]

[start]
cmd = "cd backend && python3 -m uvicorn main:app --host 0.0.0.0 --port $PORT"
