name: alertvn
description: "AlertVN - Hệ thống cảnh báo thiên tai tổng hợp cho Việt Nam"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Map
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Location
  geolocator: ^13.0.2

  # Network
  http: ^1.2.2
  connectivity_plus: ^6.1.4

  # State management
  provider: ^6.1.2

  # Local storage
  sqflite: ^2.4.2
  shared_preferences: ^2.3.5
  path_provider: ^2.1.5

  # Notifications & TTS
  flutter_local_notifications: ^18.0.1
  flutter_tts: ^4.2.2

  # Charts
  fl_chart: ^0.70.2

  # Permissions
  permission_handler: ^12.0.0+1

  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # UI
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
